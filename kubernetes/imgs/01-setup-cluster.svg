<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#ffffff"/>

  <!-- Control Plane outer box -->
  <rect x="30" y="30" width="300" height="440" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="180" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#3C3489">Control Plane</text>
  <text x="180" y="78" text-anchor="middle" font-size="12" fill="#534AB7">cluster の頭脳</text>

  <!-- kube-apiserver -->
  <rect x="54" y="100" width="252" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="180" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C" dominant-baseline="central">kube-apiserver</text>
  <text x="180" y="140" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">全操作の受付窓口 (REST API)</text>

  <!-- etcd -->
  <rect x="54" y="168" width="252" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="190" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">etcd</text>
  <text x="180" y="208" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">クラスタ状態を保存するKVストア</text>

  <!-- kube-scheduler -->
  <rect x="54" y="236" width="252" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="258" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">kube-scheduler</text>
  <text x="180" y="276" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Podをどのノードに置くか決定</text>

  <!-- kube-controller-manager -->
  <rect x="54" y="304" width="252" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="326" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">kube-controller-manager</text>
  <text x="180" y="344" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Deployment / ReplicaSet 管理など</text>

  <!-- cloud-controller-manager -->
  <rect x="54" y="372" width="252" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="180" y="394" text-anchor="middle" font-size="14" font-weight="500" fill="#444441" dominant-baseline="central">cloud-controller-manager</text>
  <text x="180" y="412" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">クラウドリソース連携 (optional)</text>

  <!-- Worker Node outer box -->
  <rect x="370" y="30" width="280" height="440" rx="16" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="510" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#633806">Worker Node</text>
  <text x="510" y="78" text-anchor="middle" font-size="12" fill="#854F0B">実際にPodが動く場所</text>

  <!-- kubelet -->
  <rect x="394" y="100" width="232" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="510" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13" dominant-baseline="central">kubelet</text>
  <text x="510" y="140" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">ノード上のPodを管理するエージェント</text>

  <!-- kube-proxy -->
  <rect x="394" y="168" width="232" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="510" y="190" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13" dominant-baseline="central">kube-proxy</text>
  <text x="510" y="208" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">Serviceのネットワークルール管理</text>

  <!-- Container Runtime -->
  <rect x="394" y="236" width="232" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="510" y="258" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13" dominant-baseline="central">Container Runtime</text>
  <text x="510" y="276" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">containerd / CRI-O など</text>

  <!-- Your Pods area -->
  <rect x="394" y="320" width="232" height="120" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="510" y="345" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A" dominant-baseline="central">Your Pods</text>
  <text x="510" y="363" text-anchor="middle" font-size="12" fill="#3B6D11" dominant-baseline="central">アプリのコンテナが動く</text>

  <!-- Pod boxes inside -->
  <rect x="408" y="380" width="60" height="44" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="438" y="402" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">Pod A</text>
  <rect x="480" y="380" width="60" height="44" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="510" y="402" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">Pod B</text>
  <rect x="552" y="380" width="60" height="44" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="582" y="402" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">Pod C</text>

  <!-- Arrow between control plane and worker node -->
  <line x1="330" y1="250" x2="368" y2="250" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="349" y="242" text-anchor="middle" font-size="12" fill="#5F5E5A">API</text>
</svg>
