<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="540" fill="#ffffff"/>

<!-- Cluster -->
<rect x="20" y="20" width="640" height="500" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">クラスタ</text>
<text x="340" y="67" text-anchor="middle" font-size="12" fill="#5F5E5A">Kubernetes 全体の管理単位</text>

<!-- Deployment -->
<rect x="50" y="85" width="580" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="109" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489" dominant-baseline="central">Deployment</text>
<text x="340" y="129" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">「Pod を3個、v1.2 で動かせ」と宣言する</text>

<!-- Arrow Deployment -> Nodes -->
<line x1="340" y1="141" x2="340" y2="165" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Node 1 -->
<rect x="50" y="170" width="280" height="330" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="190" y="198" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Worker Node 1</text>
<text x="190" y="215" text-anchor="middle" font-size="12" fill="#854F0B">物理 / 仮想サーバー</text>

<!-- Pod A -->
<rect x="74" y="230" width="232" height="110" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="254" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Pod A</text>
<rect x="90" y="268" width="200" height="52" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="290" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">コンテナ</text>
<text x="190" y="306" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">app:v1.2</text>

<!-- Pod B -->
<rect x="74" y="354" width="232" height="110" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="378" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Pod B</text>
<rect x="90" y="392" width="200" height="52" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="414" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">コンテナ</text>
<text x="190" y="430" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">app:v1.2</text>

<!-- Node 2 -->
<rect x="350" y="170" width="280" height="330" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="490" y="198" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Worker Node 2</text>
<text x="490" y="215" text-anchor="middle" font-size="12" fill="#854F0B">物理 / 仮想サーバー</text>

<!-- Pod C -->
<rect x="374" y="230" width="232" height="110" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="490" y="254" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Pod C</text>
<rect x="390" y="268" width="200" height="52" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="490" y="290" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">コンテナ</text>
<text x="490" y="306" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">app:v1.2</text>

<!-- Empty slot Node 2 -->
<rect x="374" y="354" width="232" height="110" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="490" y="404" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">空きスロット</text>
<text x="490" y="422" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">（次のPodが来るまで待機）</text>
</svg>
